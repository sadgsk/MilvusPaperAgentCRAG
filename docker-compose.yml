services:
  # ==========================================
  # 1. 消息队列 (Celery 的心脏)
  # ==========================================
  redis:
    container_name: venom-redis
    image: redis:7.2-alpine
    # 已移除 restart: always，完全受控
    ports:
      - "6379:6379"
    volumes:
      - ./venom_data/redis:/data
    command: redis-server --appendonly yes

  # ==========================================
  # 2. Milvus 依赖组件：etcd (存储元数据)
  # ==========================================
  etcd:
    container_name: venom-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./venom_data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  # ==========================================
  # 3. Milvus 依赖组件：MinIO (存储底层大文件)
  # ==========================================
  minio:
    container_name: venom-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./venom_data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==========================================
  # 4. 向量数据库核心引擎 (Milvus Standalone)
  # ==========================================
  milvus-standalone:
    container_name: venom-milvus
    image: milvusdb/milvus:v2.4.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./venom_data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy